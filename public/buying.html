<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Business Form</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;

    /* ADD YOUR BACKGROUND IMAGE URL HERE */
    background-image:url("YOUR-IMAGE-URL-HERE");
    background-size:cover;
    background-position:center;
}

/* White form container */
.container{
    background:white;
    border:3px solid #e5e5e5;
    border-radius:10px;
    padding:40px;
    width:400px;
    box-shadow:0px 8px 25px rgba(0,0,0,0.2);
}

/* Form layout */
form{
    display:flex;
    flex-direction:column;
    gap:18px;
}

/* Title */
h2{
    text-align:center;
    margin-bottom:10px;
    color:#333;
}

/* Inputs */
input, select{
    padding:12px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
    outline:none;
}

input:focus, select:focus{
    border-color:#28a745;
}

/* Submit Button */
button{
    background:#28a745;
    color:white;
    border:none;
    padding:12px;
    font-size:15px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1f8c39;
}

</style>
</head>

<div class="container">

<form>

<h2>Submit Your Link</h2>

<select>

<option></option>
</select>

<input type="url" placeholder="Enter Profile or Video Link" required>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
