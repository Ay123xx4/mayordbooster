<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-80 animate-slide">
  <h2 class="text-2xl font-bold mb-4 text-center">Sign Up</h2>
  <input id="username" placeholder="Username" class="w-full mb-2 p-2 border rounded" />
  <input id="email" placeholder="Email" class="w-full mb-2 p-2 border rounded" />
  <input id="password" type="password" placeholder="Password" class="w-full mb-4 p-2 border rounded" />
  <button onclick="signup()" class="w-full bg-green-500 text-white p-2 rounded">Sign Up</button>
  <p class="mt-4 text-center text-gray-600">
      Already have an account? 
      <a href="index.html" class="text-green-500 hover:underline font-medium">Login</a>
</div>

<script>
async function signup(){
  const res = await fetch('/signup',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      username:username.value,
      email:email.value,
      password:password.value
    })
  });

  const data = await res.json();
  alert(data.message);
}
</script>

</body>
</html>
