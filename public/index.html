<!DOCTYPE html>
<html>
<head>
<title>Login & Signup</title>

<style>

body{
background-image:url(https://i.pinimg.com/originals/e5/a3/1f/e5a31fd6f761e0fb85a1ff5e2adc7d70.gif);
font-family: Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
width:300px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:darkgreen;
}

.toggle{
text-align:center;
margin-top:10px;
cursor:pointer;
color:blue;
}

</style>

</head>

<body>

<div class="container">

<h2 id="formTitle">Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="submitForm()">Submit</button>

<p class="toggle" onclick="toggleForm()">Don't have account? Sign up</p>

</div>

<script src="script.js"></script>

</body>
</html>
